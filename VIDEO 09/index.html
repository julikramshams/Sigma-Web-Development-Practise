<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Classes in HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="firstdiv" class="red yellow">First</div>
    <div id="seconddiv">Second</div>

<!-- If I add the name of a id in the last of a link with a # in the first of the name of that id, it will focus me to that specific thing by scrolling -->
