<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media</title>
  </head>
  <body>
    <video
      src="video.mp4"
      width="500"
      controls
      loop
      poster="download.jpeg"
    ></video>
    <audio src="vedio.mp4" controls muted></audio>
    <svg height="100" width="100">
      <circle
        cx="50"
        cy="50"
        r="40"
        stroke="black"
        stroke-width="3"
        fill="red"
      />
    </svg>
    <img src="img.svg" alt="This is my SVG file" />
    <iframe
      src="https://www.codewithharry.com/blogpost/html-cheatsheet"
      width="444"
      height="444"
    ></iframe>

    <!-- Quick Quiz -->
    <!-- Create a website which shows videos of different category and audios of different categories.
    You can use YouTube videos in an iframe using YouTube's embedding feature -->
    
  </body>
</html>
