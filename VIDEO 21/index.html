<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cascade Algorithom</title>
    <style>
        /* The specificity of this is 10+1=11 */
        /* h1.yellow{
           color: rgb(26, 12, 226);
        } */
        /* The specificity of this is 1 */
        h1{
            color: aqua;
        }
        /* The specificity of this is 10 */
        .yellow {
            color: yellow;
        }
        /* The specificity of this is 10 */
        .cred {
            color: red;
        }
        /* The specificity of this is 10 */
        .cpurple {
            color: purple;
        }
        /* This is an example of attribute selector with specificity of 10. */
        /* [data-x="a"] {
            color: green;
        } */
        /* The specificity of this is 10000 */
        /* h1{
            color: rgb(10, 212, 212)!important;
        } */
    </style>
</head>
<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
    </div>
</body>
</html>
