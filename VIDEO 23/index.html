<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid rgb(91, 0, 248);
            display: inline-block;
            padding: 45px;
            width: 344px;
            margin: 34px;
            /* display: none; */
        }
        .box1 {
            /* display: none; */
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="box box1">
        I am a Box
    </div>
    <div class="box">
        I am another Box
    </div>
    <span>I am a good </span>
    <span>Boy</span>
</body>
</html>
