<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Position</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        padding: 3px;
        height: 100px;
        width: 80vw;
        border: 2px solid black;
        margin: 3px;
      }
      .box1 {
        background-color: rgb(4, 247, 255);
        /* position: sticky; */
        /* position: absolute; */
        /* top: 34px; */
        /* left: 34px; */
        /* z-index: 1; */
      }
      .box2 {
        background-color: rgb(5, 252, 5);
        position: relative;
        /* top: 34px; */
        /* left: 34px; */
      }
      .box3 {
        background-color: rgb(255, 0, 255);
        /* position: fixed;
        top: 130px;
        left: 290px; */
      }
      .box4 {
        background-color: rgb(132, 0, 255);
      }
      
      .parent {
        padding: 43px;
        margin: 34px;
        border: 3px solid black;
        /* position: absolute; */
      }

      /* Exception: transform, filter, or perspective properties can also make an element appear as positioned */
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box box1"></div>
      <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
    </div>
  </body>
</html>
