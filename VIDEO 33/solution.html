<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 4 Solution by SHAMS</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
      :root {
        --primary-color: #ff87fd;
        --secondary-color: #ae40f8;
        --background-color: #ecf0f1;
        --text-color: #422345;
      }
      body {
        font-family: Arial, sans-serif;
        background-color: var(--primary-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        /* align-items: center;
            text-align: center; */
      }
      p {
        background-color: var(--primary-color);
        color: var(--text-color);
        font-family: "Poppins", sans-serif;
      }
      a {
        text-decoration: none;
        color: var(--text-color);
      }
      li {
        list-style: none;
        color: var(--text-color);
      }
      ul {
        display: flex;
        justify-content: space-around;
        background-color: var(--background-color);
        padding: 10px;
      }
      nav {
        background-color: var(--secondary-color);
        padding: 10px;
        border-radius: 5px;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
      }
      h1,
      h2 {
        font-family: "Ballet", cursive;
        /* color: var(--secondary-color); */
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#section1">Home</a></li>
          <li><a href="#section2">About</a></li>
          <li><a href="#section3">Contact</a></li>
        </ul>
      </nav>
    </header>
    <h1>Welcome to My Website</h1>
    <p>This is a simple website layout using HTML and CSS variables.</p>
    <section id="section1">
      <h2>Home Section</h2>
      <p>This is the home section of the website.</p>
    </section>
    <section id="section2">
      <h2>About Section</h2>
      <p>This is the about section of the website.</p>
    </section>
    <section id="section3">
      <h2>Contact Section</h2>
      <p>This is the contact section of the website.</p>
    </section>
  </body>
</html>
