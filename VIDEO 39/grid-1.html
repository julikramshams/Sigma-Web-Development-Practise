<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container {
            width: 80vw;
            height: 50vh;
            border: 2px solid black;
            display: grid;
            /* grid-template-columns: minmax(100px, 1fr); */
            /* grid-template-columns: 1fr 2fr 1fr; */
            grid-template-columns: repeat(3, 1fr);
            /* gap: 10px; */
            row-gap: 10px;
            column-gap: 30px;
            /* grid-template-rows: 1fr 2fr 1fr; */
            /* grid-template-columns: [ichi]120px [ni]100px;
            grid-template-rows: [san]100px [yon]100px [go]100px; */
            justify-items: center;
            align-items: center;
            /* place-content: center; */
        }
        .item {
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }
        /* .item4 {
            grid-row: 1 / 2;
            grid-column: ichi / san;
        }
        .item1 {
            grid-row: 1 / 2;
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column: 1 / 2;
        } */
         .item2{
            justify-self: end;
            align-self: start;
         }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item item4">4</div>
        <div class="item item5">5</div>
    </div>
</body>
</html>
