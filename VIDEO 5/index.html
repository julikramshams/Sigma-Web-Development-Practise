<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img src="image.png" alt="Train Images" width="230" />

        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>designation</th>
          <th>Fav Language</th>

      </thead>
      <tbody>
        <tr>
          <td>Shams</td>
          <td>15</td>
          <td>Cybersecurity Specialist</td>

        </tr>
        <tr>
          <td>Faiza</td>

        <tr>

        </tr>
      </tfoot>

        <li>
            <a href="https://www.youtube.com/watch?v=2V1v0g3X4mE">Python</a>
        </li>
        <li>
            <a href="https://www.youtube.com/watch?v=2V1v0g3X4mE">JavaScript</a>

    <ol type="I">
        <li>
            <a href="https://www.youtube.com/watch?v=2V1v0g3X4mE">Python</a>
        </li>
        <li>
            <a href="https://www.youtube.com/watch?v=2V1v0g3X4mE">JavaScript</a>
