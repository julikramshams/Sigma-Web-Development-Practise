<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Let's Learn It</title>
</head>
<body>
    <h1>Form to appply for Sigma Web Development Course - TA</h1>
    <form action="post">
        <div>
            <label for="username">Enter your username</label><br>
            <input type="text" name="username" placeholder="Enter your username" id="username" required autofocus>
            <br><br>
            <label for="email"></label>
            <input type="email" name="email" placeholder="Enter your email" id="email" required>
            <br><br>
            <label for="password"></label>
            <input type="password" name="password" placeholder="Enter your password" id="password" required>
            <br><br>
            <label for="confirm-password"></label>
            <input type="password" name="confirm-password" placeholder="Confirm your password" id="confirm-password" required>
        </div>
        <div> 
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="terms" name="terms" value="agree">
            <label for="terms">I agree to the terms and conditions</label>
        </div>
        <div>
            <label for="comment">Enter your comment here</label>
            <br>
            <textarea name="comment" id="comment" rows="4" cols="50" required></textarea>
        </div>
        <div>
            <label for="country">Select your country</label>
            <br>
            <select name="country" id="country">
                <option value="Pakistan">Pakistan</option>
                <option value="usa">Bangladesh</option>
                <option value="uk">UK</option>
                <option value="canada">Canada</option>
            </select>
        </div>
    </form>
</body>
</html>
